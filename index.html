<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>しりとり｜言葉繋ぎ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <main class="app">
    <header class="masthead">
      <p class="masthead__kicker">言葉を繋ぐ遊び</p>
      <h1 class="masthead__title">しりとり</h1>
      <p class="masthead__sub">前の言葉の終わりから、次の言葉へ。</p>
    </header>

    <div class="mode" id="modeTabs" role="tablist" aria-label="対戦モード">
      <button class="mode__btn is-active" id="modeSolo" type="button" role="tab" aria-selected="true">ひとり</button>
      <button class="mode__btn" id="modeOnline" type="button" role="tab" aria-selected="false">ふたり対戦</button>
    </div>

    <section class="rules" id="rules" aria-label="ルール設定">
      <p class="rules__head">ルール</p>
      <div class="rules__row">
        <label class="toggle">
          <input type="checkbox" id="dictToggle" />
          <span>単語チェック（実在語のみ）</span>
        </label>
        <label class="select">
          <span>文字数しばり</span>
          <select id="minLengthSelect">
            <option value="2">なし</option>
            <option value="3">3字以上</option>
            <option value="4">4字以上</option>
            <option value="5">5字以上</option>
          </select>
        </label>
      </div>
    </section>

    <section class="lobby" id="lobby" hidden aria-label="オンライン対戦ロビー">
      <button class="btn btn--solid" id="createRoomBtn" type="button">ルームを作る</button>
      <p class="lobby__hint">上のルール設定で部屋を作成し、コードを相手に共有します</p>
      <div class="lobby__or"><span>または</span></div>
      <form class="lobby__join" id="joinForm" autocomplete="off">
        <input class="input__field" id="roomCodeInput" maxlength="8"
               placeholder="ルームコード" aria-label="ルームコード" />
        <button class="btn btn--ghost" id="joinRoomBtn" type="submit">参加</button>
      </form>
      <p class="lobby__msg" id="lobbyMsg" role="status"></p>
    </section>

    <section class="room" id="roomBanner" hidden>
      <div class="room__info">
        <span class="room__code-label">ルーム</span>
        <span class="room__code" id="roomCode">----</span>
      </div>
      <p class="room__status" id="roomStatus"></p>
      <button class="btn btn--text" id="leaveBtn" type="button">退出</button>
    </section>

    <section class="board" id="board" aria-live="polite">
      <p class="board__label">今の言葉</p>
      <p class="board__word" id="currentWord">―</p>
      <div class="seal" aria-hidden="true">
        <span class="seal__label">次</span>
        <span class="seal__char" id="nextChar">―</span>
      </div>
      <p class="board__rule" id="ruleHint" hidden></p>
    </section>

    <form class="input" id="wordForm" autocomplete="off">
      <input
        class="input__field"
        id="wordInput"
        type="text"
        placeholder="ひらがなで入力"
        aria-label="単語を入力"
      />
      <button class="input__submit" type="submit">継ぐ</button>
    </form>

    <p class="message" id="message" role="status"></p>

    <ol class="chain" id="chain" aria-label="この対戦の言葉のつながり"></ol>

    <div class="actions" id="actions">
      <button class="btn btn--ghost" id="resetBtn" type="button">はじめから</button>
      <button class="btn btn--solid" id="rematchBtn" type="button" hidden>再戦する</button>
    </div>

    <section class="history">
      <div class="history__head">
        <h2 class="history__title">これまでの記録</h2>
        <button class="btn btn--text" id="clearHistoryBtn" type="button">クリア</button>
      </div>
      <ul class="history__list" id="historyList"></ul>
    </section>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
